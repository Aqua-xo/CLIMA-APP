<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima TV Premium</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <div class="sun"></div>

    <div class="cloud cloud1">
      <span></span><span></span><span></span>
    </div>

    <div class="cloud cloud2">
      <span></span><span></span><span></span>
    </div>

    <div class="cloud cloud3">
      <span></span><span></span><span></span>
    </div>

    <div class="wind wind1"></div>
    <div class="wind wind2"></div>
    <div class="wind wind3"></div>
  </div>

  <main class="weather-tv">
    <section class="top-bar">
      <p class="channel-tag">EN VIVO • REPORTE DEL TIEMPO</p>
      <h1>🌤️ Clima TV</h1>
      <p class="subtitle">Consulta el clima actual y revisa recomendaciones rápidas según la temperatura, el viento y el estado del tiempo.</p>
    </section>

    <section class="search-panel">
      <form id="weather-form">
        <input
          type="text"
          id="city"
          placeholder="Ejemplo: Santiago, Chile"
          required
        >
        <button type="submit">Buscar clima</button>
      </form>
    </section>

    <section id="result" class="result-panel"></section>

    <section class="bottom-ticker">
      <div class="ticker-track" id="ticker">
        <span>🌍 Cargando ciudades del mundo...</span>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
